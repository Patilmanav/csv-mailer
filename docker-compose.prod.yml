version: '3.8'

services:
  csv-mailer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: csv-mailer-prod
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./templates:/app/templates:ro
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
